<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auralis Sound Language Demo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Auralis</h1>
      <p class="tagline">A Sound Language for Musical Expression</p>
      <p style="margin-top: 15px;"><a href="test_pattern.html" style="color: white; text-decoration: underline; font-size: 1.1em;">Try the Pattern Sequencer →</a></p>
    </header>

    <div class="panel">
      <h2>Examples</h2>
      <div class="examples-compact">
        <button class="example-btn" onclick="loadExample('bassdrum')" title="Deep kick drum with body and click">Bass Drum</button>
        <button class="example-btn" onclick="loadExample('snare')" title="Snappy snare with body and noise">Snare</button>
        <button class="example-btn" onclick="loadExample('hihat')" title="Metallic percussion sound">Hi-Hat</button>
        <button class="example-btn" onclick="loadExample('bell')" title="Harmonic bell with reverb">Bell</button>
        <button class="example-btn" onclick="loadExample('synth')" title="Filtered sawtooth synthesizer">Synth Lead</button>
        <button class="example-btn" onclick="loadExample('acidbass')" title="Resonant filter with ADSR envelope">Acid Bass</button>
        <button class="example-btn" onclick="loadExample('pad')" title="Slow attack pad with harmonics">Pad</button>
        <button class="example-btn" onclick="loadExample('lead')" title="Saw wave with resonant filter">Lead</button>
        <button class="example-btn" onclick="loadExample('delaybass')" title="Bass with rhythmic delay feedback">Delay Bass</button>
        <button class="example-btn" onclick="loadExample('choruslead')" title="Thick lead with chorus effect">Chorus Lead</button>
        <button class="example-btn" onclick="loadExample('flangerbass')" title="Sweeping flanger modulation">Flanger</button>
        <button class="example-btn" onclick="loadExample('stereobell')" title="Spatialized bell tones">Stereo Bell</button>
        <button class="example-btn" onclick="loadExample('spacelead')" title="Delay + chorus ambient lead">Space Lead</button>
        <button class="example-btn" onclick="loadExample('widehihat')" title="Stereo spread hi-hat percussion">Wide Hi-Hat</button>
      </div>
    </div>

    <div class="panel">
      <h2>Code Editor</h2>
      <textarea id="editor" placeholder="Write your Auralis code here..."></textarea>
      <div class="controls">
        <button class="btn-primary" onclick="compileAndPlay()">▶ Compile & Play</button>
        <button class="btn-secondary" onclick="compileOnly()">⚡ Compile Only</button>
        <button class="btn-secondary" onclick="exportWav()">⬇ Export WAV</button>
        <div class="duration-control">
          <label for="duration">Duration:</label>
          <input type="number" id="duration" value="2" min="0.1" max="10" step="0.1">
          <span>seconds</span>
        </div>
      </div>
      <div id="status"></div>
    </div>

    <div class="panel">
      <h2>Output</h2>
      <div id="output">Compiled AST will appear here...</div>
    </div>
  </div>

  <script type="module">
    import { AuralisEngine } from './scripts/auralis-engine.js';
    import { AuralisParser } from './scripts/auralis-parser.js';
    import { examples } from './scripts/examples.js';

    const engine = new AuralisEngine();
    let isInitialized = false;

    async function initEngine() {
      if (!isInitialized) {
        await engine.init();
        isInitialized = true;
        showStatus('Engine initialized', 'success');
      }
    }

    async function compileAndPlay() {
      try {
        await initEngine();

        const code = document.getElementById('editor').value;
        const duration = parseFloat(document.getElementById('duration').value) || 2;

        if (!code.trim()) {
          showStatus('Please enter some Auralis code', 'error');
          return;
        }

        engine.compile(code);

        const soundNames = extractSoundNames(code);
        if (soundNames.length === 0) {
          showStatus('No sounds defined to play', 'error');
          return;
        }

        const soundName = soundNames[0];
        engine.play(soundName, {}, duration);

        showStatus(`Playing "${soundName}" for ${duration}s`, 'success');
        displayAST(code);
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    async function exportWav() {
      try {
        await initEngine();

        const code = document.getElementById('editor').value;
        const duration = parseFloat(document.getElementById('duration').value) || 2;

        if (!code.trim()) {
          showStatus('Please enter some Auralis code', 'error');
          return;
        }

        engine.compile(code);

        const soundNames = extractSoundNames(code);
        if (soundNames.length === 0) {
          showStatus('No sounds defined to export', 'error');
          return;
        }

        const soundName = soundNames[0];
        const blob = await engine.renderToWav(soundName, {}, duration);

        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${soundName}.wav`;
        link.click();
        URL.revokeObjectURL(url);

        showStatus(`Exported "${soundName}.wav"`, 'success');
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    function compileOnly() {
      try {
        const code = document.getElementById('editor').value;

        if (!code.trim()) {
          showStatus('Please enter some Auralis code', 'error');
          return;
        }

        displayAST(code);
        showStatus('Compilation successful', 'success');
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    function displayAST(code) {
      const parser = new AuralisParser();
      const ast = parser.parse(code);
      document.getElementById('output').textContent = JSON.stringify(ast, null, 2);
    }

    function extractSoundNames(code) {
      const matches = code.matchAll(/sound\s+(\w+)/g);
      return Array.from(matches, m => m[1]);
    }

    function loadExample(exampleName) {
      const example = examples[exampleName];
      if (example) {
        document.getElementById('editor').value = example;
        showStatus(`Loaded example: ${exampleName}`, 'info');
      }
    }

    function showStatus(message, type) {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;

      if (type === 'success' || type === 'info') {
        setTimeout(() => {
          statusDiv.textContent = '';
          statusDiv.className = 'status';
        }, 3000);
      }
    }

    window.compileAndPlay = compileAndPlay;
    window.compileOnly = compileOnly;
    window.exportWav = exportWav;
    window.loadExample = loadExample;

    loadExample('bassdrum');
  </script>
</body>
</html>
